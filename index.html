<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Word Game</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  align-items: center;
  font-family: Arial, sans-serif;
  background: #1f2937;
  color: white;
}

.container {
  width: 100%;
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 60px;
}

.word {
  font-size: 48px;
  font-weight: bold;
  text-align: center;
  flex-grow: 1;
}

button {
  padding: 12px 24px;
  font-size: 18px;
  cursor: pointer;
  border: none;
  border-radius: 8px;
}

.skip {
  background: #555;
  color: white;
}

.right {
  background: #22c55e;
  color: white;
}

.score {
  margin-bottom: 30px;
  font-size: 22px;
  font-weight: bold;
}
</style>
</head>
<body>

<div class="container">
  <button class="skip" onclick="skipWord()">Skip</button>

  <div class="word" id="wordDisplay"></div>

  <button class="right" onclick="correctWord()">Right</button>
</div>

<div class="score">
  Points: <span id="score">0</span>
</div>

<script>
const words = [
  "Lion","Bigfoot","Monkey","Donkey","Capybara","Squank",
  "Walrus","Wolf","Tiger","Alien","Anna","Desiree",
  "Caden","Alexis","Beetle","Butterfly","Firefly",
  "Pigeon","Water Buffalo","Manatee","Blue Whale",
  "Platypus","Beaver","Kangaroo","Snow Leopard"
];

let remainingWords = [...words];
let score = 0;

function nextWord() {
  if (remainingWords.length === 0) {
    remainingWords = [...words]; // reset list
  }

  const index = Math.floor(Math.random() * remainingWords.length);
  document.getElementById("wordDisplay").textContent = remainingWords[index];
  remainingWords.splice(index, 1);
}

function correctWord() {
  score++;
  document.getElementById("score").textContent = score;
  nextWord();
}

function skipWord() {
  nextWord();
}

// Show first word on load
nextWord();
</script>

</body>
</html>
