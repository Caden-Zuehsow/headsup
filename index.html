<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GeoBrawl - Word Round</title>

<style>
:root {
  --ocean: #4A90D6;
  --background: #11284B;
  --button: #4A90D6;
}

body {
  font-family: system-ui, Arial, sans-serif;
  background: var(--background);
  margin: 0;
  color: #E8E8E8;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Main layout */
.main-container {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

/* Word styling */
.filler-word {
  font-size: 4rem;
  font-weight: 700;
  color: var(--ocean);
  text-align: center;
  text-shadow: 0 0 15px rgba(74,144,214,0.4);
}

/* Buttons */
.side-button {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: var(--button);
  color: white;
  padding: 14px 24px;
  border-radius: 10px;
  text-decoration: none;
  font-size: 1.2rem;
  font-weight: 600;
  transition: 0.2s;
}

.side-button:hover {
  background: #2f6cb0;
  transform: translateY(-50%) translateY(-2px);
}

.skip {
  left: 40px;
}

.right {
  right: 40px;
}
</style>
</head>

<body>

<div class="main-container">
  <button class="side-button skip" onclick="newWord()">Skip</button>

  <div class="filler-word" id="wordDisplay"></div>

  <button class="side-button right" onclick="newWord()">Right</button>
</div>

<script>
const words = [
  "Lion",
  "Bigfoot",
  "Monkey",
  "Donkey",
  "Capybara",
  "Squank",
  "Walrus",
  "Wolf",
  "Tiger",
  "Alien",
  "Anna",
  "Desiree",
  "Caden",
  "Alexis",
  "Beetle",
  "Butterfly",
  "Firefly",
  "Pigeon",
  "Water Buffalo",
  "Manatee",
  "Blue Whale",
  "Platypus",
  "Beaver",
  "Kangaroo",
  "Snow Leopard"
];

function newWord() {
  const randomIndex = Math.floor(Math.random() * words.length);
  document.getElementById("wordDisplay").textContent = words[randomIndex];
}

// Generate a word on page load
newWord();
</script>

</body>
</html>
