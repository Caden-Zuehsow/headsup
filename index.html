<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Word Game</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  font-family: Arial, sans-serif;
  background: #1f2937;
  color: white;
}

.top-bar {
  width: 100%;
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
  font-size: 20px;
  font-weight: bold;
  box-sizing: border-box;
}

.container {
  flex: 1;
  display: flex;
  width: 100%;
}

/* Make buttons 25% each */
.skip, .right {
  width: 25%;
  font-size: 24px;
  border: none;
  cursor: pointer;
}

/* Word takes middle 50% */
.word {
  width: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 48px;
  font-weight: bold;
  text-align: center;
}

/* Button colors */
.skip {
  background: #555;
  color: white;
}

.right {
  background: #22c55e;
  color: white;
}

.new-round {
  background: #3b82f6;
  color: white;
  padding: 20px;
  font-size: 22px;
  border: none;
  display: none;
  cursor: pointer;
}
</style>
</head>
<body>

<div class="top-bar">
  <div>Time: <span id="timer">60</span>s</div>
  <div>Points: <span id="score">0</span></div>
</div>

<div class="container" id="gameArea">
  <button class="skip" onclick="skipWord()">Skip</button>

  <div class="word" id="wordDisplay"></div>

  <button class="right" onclick="correctWord()">Right</button>
</div>

<button class="new-round" id="newRoundBtn" onclick="startGame()">
  New Round
</button>

<script>
const words = [
  "Lion","Bigfoot","Monkey","Donkey","Capybara","Squank",
  "Walrus","Wolf","Tiger","Alien","Anna","Desiree",
  "Caden","Alexis","Beetle","Butterfly","Firefly",
  "Pigeon","Water Buffalo","Manatee","Blue Whale",
  "Platypus","Beaver","Kangaroo","Snow Leopard"
];

let remainingWords = [];
let score = 0;
let timeLeft = 60;
let timerInterval = null;
let gameActive = false;

function nextWord() {
  if (remainingWords.length === 0) {
    remainingWords = [...words];
  }

  const index = Math.floor(Math.random() * remainingWords.length);
  document.getElementById("wordDisplay").textContent = remainingWords[index];
  remainingWords.splice(index, 1);
}

function correctWord() {
  if (!gameActive) return;
  score++;
  document.getElementById("score").textContent = score;
  nextWord();
}

function skipWord() {
  if (!gameActive) return;
  nextWord();
}

function startGame() {
  score = 0;
  timeLeft = 60;
  remainingWords = [...words];
  gameActive = true;

  document.getElementById("score").textContent = score;
  document.getElementById("timer").textContent = timeLeft;
  document.getElementById("newRoundBtn").style.display = "none";
  document.getElementById("gameArea").style.display = "flex";

  nextWord();

  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    document.getElementById("timer").textContent = timeLeft;

    if (timeLeft <= 0) {
      endGame();
    }
  }, 1000);
}

function endGame() {
  clearInterval(timerInterval);
  gameActive = false;

  document.getElementById("gameArea").style.display = "none";
  document.getElementById("newRoundBtn").style.display = "block";
}

startGame();
</script>

</body>
</html>
