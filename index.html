<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GeoBrawl - Filler</title>

<style>
:root {
  --ocean: #4A90D6;
  --background: #11284B;
  --button: #4A90D6;
}

body {
  font-family: system-ui, Arial, sans-serif;
  background: var(--background);
  margin: 0;
  color: #E8E8E8;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Top spacing similar to homepage */
.header-space {
  height: 80px;
}

/* Main layout */
.main-container {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

/* Filler word */
.filler-word {
  font-size: 4rem;
  font-weight: 700;
  color: var(--ocean);
  text-align: center;
}

/* Buttons */
.side-button {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: var(--button);
  color: white;
  padding: 14px 24px;
  border-radius: 10px;
  text-decoration: none;
  font-size: 1.2rem;
  font-weight: 600;
  transition: 0.2s;
}

.side-button:hover {
  background: #2f6cb0;
  transform: translateY(-50%) translateY(-2px);
}

/* Left and Right positioning */
.skip {
  left: 40px;
}

.right {
  right: 40px;
}
</style>
</head>

<body>

<div class="header-space"></div>

<div class="main-container">
  <a href="#" class="side-button skip">Skip</a>

  <div class="filler-word">FILLER</div>

  <a href="#" class="side-button right">Right</a>
</div>

</body>
</html>
